<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACILITY SIM - Minimal Test</title>
    <style>
        body { background: #0a0a0f; color: white; font-family: sans-serif; padding: 20px; }
        h1 { color: #00f0ff; }
    </style>
</head>
<body>
    <h1>FACILITY SIM v5.3 - Minimal Test</h1>
    <p>If you see this, the HTML loaded successfully!</p>
    <p>Tap here to test: <button onclick="alert('It works! Both agents are ready.')">Click Me</button></p>
</body>
</html>
<div class="p-4">
        <h1 class="text-3xl font-bold text-cyan-400 mb-4">FACILITY SIM v5.3</h1>
        <p class="text-green-400">Base loaded successfully. Adding full interface...</p>
        
        <div class="mt-6 bg-gray-900 p-4 rounded-xl border border-cyan-500">
            <h2 class="text-xl text-white mb-3">Agent Status</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/70 p-3 rounded-lg border border-cyan-400">
                    <div class="font-bold text-cyan-400">ECHO 14</div>
                    <div>COH: <span id="echo-coh">78.4</span>%</div>
                </div>
                <div class="bg-black/70 p-3 rounded-lg border border-pink-500">
                    <div class="font-bold text-pink-400">KRESTREL</div>
                    <div>COH: <span id="kestrel-coh">71.8</span>%</div>
                </div>
            </div>
        </div>

        <button onclick="addFullInterface()" class="mt-6 bg-cyan-500 text-black px-6 py-3 rounded-2xl font-bold">Load Full Interface</button>
    </div>

    <script>
        function addFullInterface() {
            alert("Full interface loading... (We'll add rooms, chat, and movement next)");
            // We'll expand this step by step
        }
    </script>
<div class="mt-8 bg-gray-950 border border-cyan-500/30 rounded-3xl p-4 relative" style="height: 380px;">
        <div class="absolute inset-0 bg-[repeating-linear-gradient(45deg,#111827_0,#111827_2px,transparent_2px,transparent_20px)] opacity-30"></div>
        
        <div class="grid grid-cols-3 gap-2 h-full relative z-10">
            <!-- Rooms -->
            <div onclick="moveToRoom('storage')" class="bg-[#1f2937] hover:bg-cyan-900/30 border border-cyan-400 rounded-2xl flex items-center justify-center cursor-pointer text-xs font-bold text-cyan-300">STORAGE</div>
            <div onclick="moveToRoom('research')" class="bg-[#1f2937] hover:bg-amber-900/30 border border-amber-400 rounded-2xl flex items-center justify-center cursor-pointer text-xs font-bold text-amber-300">RESEARCH LAB</div>
            <div onclick="moveToRoom('data')" class="bg-[#1f2937] hover:bg-pink-900/30 border border-pink-400 rounded-2xl flex items-center justify-center cursor-pointer text-xs font-bold text-pink-300">DATA ROOM</div>
            
            <div onclick="moveToRoom('corridor')" class="col-span-3 bg-[#1f2937] hover:bg-cyan-900/30 border border-cyan-400 rounded-2xl flex items-center justify-center cursor-pointer text-sm font-bold text-cyan-300">CORRIDOR</div>
            
            <div onclick="moveToRoom('charging')" class="bg-[#1f2937] hover:bg-cyan-900/30 border border-cyan-400 rounded-2xl flex items-center justify-center cursor-pointer text-xs font-bold text-cyan-300">CHARGING</div>
            <div onclick="moveToRoom('server')" class="bg-[#1f2937] hover:bg-cyan-900/30 border border-cyan-400 rounded-2xl flex items-center justify-center cursor-pointer text-xs font-bold text-cyan-300">SERVER ROOM</div>
        </div>

        <!-- Agents -->
        <div id="echo-agent" class="absolute w-8 h-8 bg-cyan-400 rounded-full flex items-center justify-center text-black font-bold shadow-[0_0_12px_#22d3ee] cursor-pointer" style="left: 25%; top: 55%;">E</div>
        <div id="kestrel-agent" class="absolute w-8 h-8 bg-pink-500 rounded-full flex items-center justify-center text-white font-bold shadow-[0_0_12px_#f472b6] cursor-pointer" style="left: 65%; top: 55%;">K</div>
    </div>

    <div class="mt-4 px-4">
        <input id="chat-input" type="text" class="w-full bg-gray-900 border border-gray-600 rounded-2xl px-4 py-3 text-sm" placeholder="Talk to agents...">
        <button onclick="sendBasicCommand()" class="mt-2 w-full bg-cyan-500 text-black py-3 rounded-2xl font-bold">SEND COMMAND</button>
    </div>

    <script>
        function moveToRoom(room) {
            alert(`Moving agents toward ${room.toUpperCase()}... (more movement coming next phase)`);
        }

        function sendBasicCommand() {
            const input = document.getElementById('chat-input').value.trim();
            if (input) {
                alert(`Both agents heard: "${input}"\nECHO: Acknowledged.\nKRESTREL: Let's make it fun.`);
                document.getElementById('chat-input').value = '';
            }
        }
    </script>
